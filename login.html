<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login - Song Creator Studio</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >
</head>
<link rel="stylesheet" href="css/desktop-ui.css">

<body>

  <div class="container auth-container">

    <!-- Logo -->

    <div class="logo-box">
      <img
        src="assets/logo.png"
        alt="GB Logo"
        class="logo auth-logo"
      >
    </div>

    <!-- Titel -->

    <h1>Willkommen zurück</h1>

    <p class="subtitle">
      Melde dich an, um deine Songs zu verwalten.
    </p>

    <!-- Login Karte -->

    <div class="auth-card">

      <!-- Benutzername / E-Mail -->

      <div class="input-group">

        <label>
          Benutzername oder E-Mail
        </label>

        <input
          type="text"
          id="email"
          placeholder="Benutzername oder E-Mail"
        >

      </div>

      <!-- Passwort -->

      <div class="input-group">

        <label>
          Passwort
        </label>

        <div class="password-input">

          <input
            type="password"
            id="password"
            placeholder="Passwort"
          >

          <button
            type="button"
            class="eye-btn"
            onclick="togglePassword('password')"
          >
            👁️
          </button>

        </div>

      </div>

      <!-- Angemeldet bleiben -->

      <div class="remember-box">

        <input
          type="checkbox"
          id="remember"
        >

        <label for="remember">
          Angemeldet bleiben
        </label>

      </div>

      <!-- Login -->

      <button
        class="main-btn"
        onclick="validateLogin()"
      >
        🔐 Anmelden
      </button>

      <!-- Links -->

      <div class="login-links">

        <a href="forgot-password.html">
          Passwort vergessen?
        </a>

        <a href="register.html">
          Noch keinen Account?
          Jetzt registrieren
        </a>

      </div>

    </div>

    <!-- Zurück -->

    <p
      style="
      margin-top:30px;
      "
    >
      <a
        href="index.html"
        style="
        color:#b6c2d1;
        text-decoration:none;
        "
      >
        ← Zur Startseite
      </a>
    </p>

  </div>

  <!-- JS -->

  <script src="js/auth.js"></script>

</body>
</html>
