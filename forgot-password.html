<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Passwort vergessen - Song Creator Studio</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >
</head>

<body>

  <div class="container auth-container">

    <!-- Logo -->

    <div class="logo-box">
      <img
        src="assets/logo.png"
        alt="GB Logo"
        class="logo auth-logo"
      >
    </div>

    <!-- Titel -->

    <h1>Passwort vergessen</h1>

    <p class="subtitle">
      Gib deine E-Mail-Adresse ein, um dein Passwort zurückzusetzen.
    </p>

    <!-- Karte -->

    <div class="auth-card">

      <div class="input-group">

        <label>
          E-Mail-Adresse
        </label>

        <input
          type="email"
          id="resetEmail"
          placeholder="deine@email.de"
        >

      </div>

      <!-- Button -->

      <button
        class="main-btn"
        onclick="sendResetCode()"
      >
        📧 Code senden
      </button>

      <!-- Links -->

      <div class="login-links">

        <a href="login.html">
          ← Zurück zum Login
        </a>

        <a href="register.html">
          Noch keinen Account?
          Jetzt registrieren
        </a>

      </div>

    </div>

    <!-- Zurück -->

    <p
      style="
      margin-top:30px;
      "
    >
      <a
        href="index.html"
        style="
        color:#b6c2d1;
        text-decoration:none;
        "
      >
        ← Zur Startseite
      </a>
    </p>

  </div>

  <script src="js/auth.js"></script>

</body>
</html>
