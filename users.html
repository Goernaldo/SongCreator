<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Profil – Song Creator</title><link rel="stylesheet" href="css/style.css"></head><body class="shop-page"><main class="shop-shell profile-shell"><a class="shop-back" href="settings.html">← Mehr</a><section class="shop-hero profile-hero"><div class="premium-mark">👤</div><p class="shop-kicker">Dein Konto</p><h1>Profil</h1></section><section class="profile-grid"><article class="profile-stat"><span>Benutzername</span><strong id="profileUsername">Gast</strong></article><article class="profile-stat"><span>Rolle</span><strong id="profileRole">Gast</strong></article><article class="profile-stat"><span>Premium-Status</span><strong id="profilePremium">Free</strong></article><article class="profile-stat"><span>Mitglied seit</span><strong id="profileSince">Nicht verfügbar</strong></article><article class="profile-stat"><span>Songs erstellt</span><strong id="profileSongs">0</strong></article><article class="profile-stat"><span>Cover erstellt</span><strong id="profileCovers">0</strong></article></section></main><script src="js/app.js"></script><script>document.addEventListener('DOMContentLoaded',function(){document.getElementById('profileUsername').textContent=getUsername();document.getElementById('profileRole').textContent=getRole();document.getElementById('profilePremium').textContent=isPremium()?'Premium aktiv':'Free Account';document.getElementById('profileSince').textContent=localStorage.getItem('memberSince')||localStorage.getItem('createdAt')||'Nicht verfügbar';let songs=[];try{songs=JSON.parse(localStorage.getItem('songCreator.results.v1')||localStorage.getItem('songs')||'[]');}catch(_){songs=[];}document.getElementById('profileSongs').textContent=Array.isArray(songs)?songs.length:0;document.getElementById('profileCovers').textContent=localStorage.getItem('coverCount')||'0';});</script></body></html>
