<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Registrieren - Song Creator Studio</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >
</head>
<link rel="stylesheet" href="css/desktop-ui.css">

<body>

  <div class="container auth-container">

    <!-- Logo -->

    <div class="logo-box">
      <img
        src="assets/logo.png"
        alt="GB Logo"
        class="logo auth-logo"
      >
    </div>

    <!-- Titel -->

    <h1>Registrieren</h1>

    <p class="subtitle">
      Erstelle dein kostenloses Konto.
    </p>

    <!-- Registrierung -->

    <div class="auth-card register-card">

      <!-- Benutzername -->

      <div class="input-group">

        <label>
          Benutzername
        </label>

        <input
          type="text"
          id="username"
          placeholder="Benutzername"
        >

      </div>

      <!-- E-Mail -->

      <div class="input-group">

        <label>
          E-Mail
        </label>

        <input
          type="email"
          id="email"
          placeholder="deine@email.de"
        >

      </div>

      <!-- Passwort -->

      <div class="password-row">

        <div class="input-group">

          <label>
            Passwort
          </label>

          <div class="password-input">

            <input
              type="password"
              id="password"
              placeholder="Passwort"
            >

            <button
              type="button"
              class="eye-btn"
              onclick="togglePassword('password')"
            >
              👁️
            </button>

          </div>

        </div>

        <!-- Passwort wiederholen -->

        <div class="input-group">

          <label>
            Wiederholen
          </label>

          <div class="password-input">

            <input
              type="password"
              id="password2"
              placeholder="Wiederholen"
            >

            <button
              type="button"
              class="eye-btn"
              onclick="togglePassword('password2')"
            >
              👁️
            </button>

          </div>

        </div>

      </div>

      <!-- AGB -->

      <div class="remember-box">

        <input
          type="checkbox"
          id="agb"
        >

        <label for="agb">
          Ich akzeptiere die AGB und
          Datenschutzbestimmungen.
        </label>

      </div>

      <!-- Button -->

      <button
        class="main-btn"
        onclick="validateRegister()"
      >
        📝 Registrieren
      </button>

      <!-- Links -->

      <div class="login-links">

        <a href="login.html">
          Bereits ein Konto?
          Jetzt anmelden
        </a>

      </div>

    </div>

    <!-- Zurück -->

    <p
      style="
      margin-top:30px;
      "
    >
      <a
        href="index.html"
        style="
        color:#b6c2d1;
        text-decoration:none;
        "
      >
        ← Zur Startseite
      </a>
    </p>

  </div>

  <script src="js/auth.js"></script>

</body>
</html>
