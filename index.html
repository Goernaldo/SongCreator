<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Song Creator Studio
  </title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >
</head>
<link rel="stylesheet" href="css/desktop-ui.css">

<body>

<div class="container">

  <!-- Logo -->

  <div class="logo-box">

    <img
      src="assets/logo.png"
      alt="GB Logo"
      class="logo"
    >

  </div>

  <!-- Titel -->

  <h1>
    Song Creator Studio
  </h1>

  <p class="subtitle">
    by GörnaldoBerlin
  </p>

  <!-- Login Status -->

  <div
    id="userInfo"
    class="auth-card"
    style="
    display:none;
    margin-bottom:25px;
    "
  >

    <h3
      id="welcomeText"
    >
      Willkommen
    </h3>

    <p
      id="roleText"
      style="
      color:#b6c2d1;
      margin-top:10px;
      "
    >
      Rolle:
    </p>

  </div>

  <!-- Kachelmenü -->

  <div class="menu-grid">

    <!-- Neuer Song -->

    <div
      class="menu-card"
      onclick="goTo('create-song.html')"
    >

      <div class="icon">
        🎵
      </div>

      <div class="text">
        Neuer Song
      </div>

    </div>

    <!-- Meine Songs -->

    <div
      class="menu-card"
      onclick="goTo('my-songs.html')"
    >

      <div class="icon">
        📁
      </div>

      <div class="text">
        Meine Songs
      </div>

    </div>

    <!-- Login -->

    <div
      id="loginCard"
      class="menu-card"
      onclick="openAccountArea()"
    >

      <div class="icon">
        🔐
      </div>

      <div class="text">
        Login
      </div>

      <small class="account-summary">Anmelden oder Account öffnen</small>

    </div>

    <!-- Logout -->

    <div
      id="logoutCard"
      class="menu-card"
      onclick="logout()"
      style="display:none;"
    >

      <div class="icon">
        🚪
      </div>

      <div class="text">
        Logout
      </div>

    </div>

    <!-- Mehr -->

    <div
      class="menu-card"
      onclick="goTo('settings.html')"
    >

      <div class="icon">
        ⚙️
      </div>

      <div class="text">
        Mehr
      </div>

    </div>

    <!-- Premium-Shop -->

    <div
      class="menu-card"
      onclick="goTo('shop.html')"
    >

      <div class="icon">
        💎
      </div>

      <div class="text">
        Premium-Shop
      </div>

    </div>

  </div>

  <!-- Version -->

  <p
    style="
    margin-top:40px;
    color:#b6c2d1;
    font-size:14px;
    "
  >
    Version 1.0 Beta
  </p>

</div>

<script src="js/app.js"></script>
<script src="js/settings-runtime.js"></script>
<script src="js/auth.js"></script>
<script src="js/navigation.js"></script>

<script>

// =========================
// Login Status
// =========================

document.addEventListener(
  "DOMContentLoaded",
  () => {

    const loggedIn =
      localStorage.getItem(
        "loggedIn"
      );

    const username =
      localStorage.getItem(
        "username"
      );

    const role =
      localStorage.getItem(
        "role"
      );

    if (
      loggedIn === "true"
    ) {

      document
        .getElementById(
          "userInfo"
        )
        .style.display =
          "block";

      document
        .getElementById(
          "logoutCard"
        )
        .style.display =
          "block";

      document
        .getElementById(
          "welcomeText"
        )
        .innerText =
          `👋 Willkommen ${username}`;

      document
        .getElementById(
          "roleText"
        )
        .innerText =
          `Rolle: ${role}`;

    }

  }
);

</script>
<script src="js/main-account.js"></script>

</body>
</html>
